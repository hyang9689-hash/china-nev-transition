name: Test and publish Quarto site

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.25"
          enable-cache: true

      - name: Install locked Python dependencies
        run: uv sync --frozen --python 3.12

      - name: Rebuild derived tables and figures
        run: uv run --frozen python scripts/build_analysis.py

      - name: Rebuild and execute notebook
        run: |
          uv run --frozen python scripts/build_notebook.py
          uv run --frozen python -m nbconvert --to notebook --execute --inplace notebooks/01_exploration.ipynb --ExecutePreprocessor.timeout=120 --ExecutePreprocessor.record_timing=False

      - name: Run unit and schema tests
        run: uv run --frozen python -m unittest discover -s tests -v

      - name: Verify executed notebook has no stored errors
        run: >-
          uv run --frozen python -c "import nbformat;
          n=nbformat.read('notebooks/01_exploration.ipynb', 4);
          errors=[o for c in n.cells if c.cell_type=='code' for o in c.get('outputs', []) if o.output_type=='error'];
          assert not errors, f'{len(errors)} stored notebook errors'"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.38"

      - name: Render website
        run: quarto render

      - name: Render final course PDF
        run: quarto render final_report.qmd --output final_report.pdf

      - name: Validate submission package provenance notebook citations and rendered links
        run: uv run --frozen python scripts/validate_project.py

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
